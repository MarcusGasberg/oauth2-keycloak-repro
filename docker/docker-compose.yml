services:

  oauth2-proxy:
    container_name: example-oauth2-proxy
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
    restart: unless-stopped
    command: --config /oauth2-proxy.cfg --alpha-config /oauth2-proxy-alpha-cfg.yaml --redirect-url=http://host.docker.internal:14180/oauth2/callback --reverse-proxy=true
    hostname: oauth2-proxy
    volumes:
      - "./oauth2-proxy.cfg:/oauth2-proxy.cfg"
      - "./oauth2-proxy-alpha-cfg.yaml:/oauth2-proxy-alpha-cfg.yaml"
    environment:
      EXTERNAL_URL: http://host.docker.internal:14180
      CLIENT_ID: my-app
    networks:
      service-network: {}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy

  keycloak:
    container_name: example-keycloak
    image: quay.io/keycloak/keycloak:26.0.5
    restart: unless-stopped
    ports:
      - 18080:8080
    command:
      - start-dev
      - --import-realm
      - --verbose
    volumes:
      - ./my-app-realm.json:/opt/keycloak/data/import/my-app-realm.json
      - ./master-realm.json:/opt/keycloak/data/import/master-realm.json
    networks:
      - service-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Keycloak's health endpoints aren't enabled in start-dev, so probe the
      # realm's OIDC discovery doc — that's exactly what oauth2-proxy needs ready.
      # The Host header must match the issuer host (host.docker.internal:18080),
      # or Keycloak returns 500 on the discovery endpoint. No curl in the image,
      # so use bash's /dev/tcp (sh is symlinked to bash here).
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/my-app/.well-known/openid-configuration HTTP/1.0\\r\\nHost: host.docker.internal:18080\\r\\n\\r\\n' >&3 && cat <&3 | grep -q issuer"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  my-app-web-app:
    container_name: my-app-web-app
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
    restart: unless-stopped
    ports:
      - 3000:3000
    networks:
      - service-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    container_name: example-nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - 14180:80
    volumes:
      - "./nginx.conf:/etc/nginx/conf.d/default.conf"
    networks:
      - service-network
    depends_on:
      - oauth2-proxy

networks:
  service-network:
    name: service-network
    ipam:
        driver: default
        config:
            - subnet: "192.169.0.0/24"
              gateway: "192.169.0.1"
